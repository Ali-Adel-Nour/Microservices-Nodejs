version: '3.8'

services:
  catalog_db_server:
    image: postgres:16-alpine
    container_name: catalog_postgres
    restart: always
    environment:
      POSTGRES_USER: catalog_db
      POSTGRES_PASSWORD: catalog_password
      POSTGRES_DB: catalog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  order_db_server:
    image: postgres:16-alpine
    container_name: order_postgres
    restart: always
    environment:
      POSTGRES_USER: order_db
      POSTGRES_PASSWORD: order_password
      POSTGRES_DB: order
    ports:
      - "5437:5432"
    volumes:
      - order_postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  order_postgres_data:

